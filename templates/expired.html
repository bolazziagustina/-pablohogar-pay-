        .icon {
            width: 72px; height: 72px; background: #f0f7ff;
            border: 2px solid #c8dff5; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;
        }
        .icon svg { width: 32px; height: 32px; fill: #6b91b8; }

        h1 { font-size: 22px; font-weight: 700; color: #0d3a6e; margin-bottom: 10px; }
        p { font-size: 14px; color: #6b91b8; line-height: 1.7; }

        .brand-footer {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 12px; color: #6b91b8;
        }
        .brand-footer svg { width: 20px; height: 20px; }

        .brand-footer strong span { color: #38bdf8; }
