<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Pablo Hogar Pay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f7ff;
            color: #1a2a3a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-container { width: 100%; max-width: 380px; }

        .brand {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo svg { width: 44px; height: 44px; }
        .brand-logo .wordmark {
            font-size: 22px;
            font-weight: 700;
            color: #0d4fa8;
            letter-spacing: -0.3px;
        }
        .brand-logo .wordmark span { color: #38bdf8; }
        .brand p { font-size: 13px; color: #6b91b8; }

        .login-card {
            background: #fff;
            border: 1px solid #c8dff5;
            border-radius: 16px;
            padding: 36px 32px;
            box-shadow: 0 4px 24px rgba(13, 79, 168, 0.08);
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .login-card h2 { font-size: 18px; font-weight: 600; color: #0d3a6e; margin-bottom: 4px; }
        .login-card .subtitle { font-size: 13px; color: #6b91b8; margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 12px; font-weight: 500; color: #4a7aaa;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%; background: #f7faff; border: 1px solid #c8dff5;
            border-radius: 10px; padding: 13px 16px; color: #0d2a4a;
            font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
            background: #fff;
        }
        .form-group input::placeholder { color: #a8c8e8; }

        .error-msg {
            background: #fff5f5; border: 1px solid #fecaca; border-radius: 8px;
            padding: 10px 14px; font-size: 13px; color: #dc2626;
            margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
        }
        .error-msg::before { content: "✕"; font-size: 10px; font-weight: 700; flex-shrink: 0; }

        .btn-login {
            width: 100%; background: #0d4fa8; color: #fff; border: none;
            border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-top: 8px;
        }
        .btn-login:hover { background: #0a3d85; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(13,79,168,0.25); }
        .btn-login:active { transform: translateY(0); }

        .login-footer { text-align: center; margin-top: 24px; font-size: 11px; color: #a8c8e8; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand">
            <div class="brand-logo">
                <!-- Casita Pablo Hogar -->
                <svg viewBox="0 0 555 555" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#52bbf3" fill-rule="evenodd" d="M149.1,70c16-2.4,230.9-.9,252.8-.9,44.2,0,77.8-5.6,110.1,17.1,21.9,15.4,42.3,44.5,43.1,84.1,1.6,84,0,169.8,0,254s4.7,84-11.4,115.9c-12.5,24.8-37.2,48.7-72.4,53.5-16.8,2.3-230.7.8-253.4.8-44.3,0-78.6,5.4-110.1-17.1-21.9-15.6-42.2-44.4-43-84.1-1.7-84,0-169.8,0-254s-4.7-84.1,11.3-115.9c13.1-25.9,37.4-48,73-53.4h0ZM147.6,1.3c-50.8,5.5-82.3,29.2-105.2,55.5C18.4,84.6.8,125.5.7,175.3c-.1,106.3-1.6,213.9,0,320,1.4,89.2,66.9,162.2,152.6,167.6,24.8,1.6,54.2.2,79.5.2h160c25.4,0,55.4,1.4,80-.7,86.5-7.4,146.1-86,146.2-174.2v-160c0-53.3.9-107,0-160-1.6-87.8-67.4-163.5-152.2-167.5-25.8-1.2-53.9-.2-80-.2s-219.8-1.4-239.3.7h.1Z"/>
                    <path fill="#05021f" fill-rule="evenodd" d="M270.3,498.4h-102.4v-161.4c4.2-1.8,97.1-70.2,106.9-77,6.5-4.5,11.8-8.7,18-13,5.6-3.9,12.7-10,18.2-12.5,23.2,17.4,47.3,34.3,70.6,51.2l71.3,51.5v160.9h-102.8c0,.1.2-106.2.2-106.2h-79.2l-.8,106.5h0ZM131.3,339.9c-3.7-4.2-7.3-10-10.5-14.5-3.5-4.9-8.3-10.6-10.6-15l57.4-42.1.2-103h49.3v66.7c.1,0,92.8-66.5,92.8-66.5,3.6,1.5,8.6,5.8,12.3,8.4,4.4,3.1,8.5,6.2,12.8,9.2,39,27.3,85.7,62.1,124.4,90.6,16.4,12.1,34,24.2,50.2,36.6-1.5,2.9-19.2,27.5-21.5,29.5-2.7-1.3-8.1-5.7-11.1-7.7l-122.1-88.9c-3.8-2.8-41.3-30.6-45.1-32-3.8,2.2-7.2,5.2-11.2,7.9-40.3,28.1-83,61.3-123,89l-44.4,31.8h.1Z"/>
                </svg>
                <div class="wordmark">Pablo Hogar<span> Pay</span></div>
            </div>
            <p>Panel de administración</p>
        </div>

        <div class="login-card">
            <h2>Iniciar sesión</h2>
            <p class="subtitle">Acceso restringido al equipo interno</p>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" name="username" placeholder="Tu usuario"
                           autocomplete="username" required autofocus
                           value="{{ request.form.get('username', '') }}">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" placeholder="••••••••"
                           autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Entrar al panel</button>
            </form>
        </div>

        <div class="login-footer">Pablo Hogar Pay · Acceso seguro</div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Verificando...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
        });
    </script>
</body>
</html>
